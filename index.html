<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json?v=11">
  <title>Резерв ID</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: red; }
    img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    #debug {
      position: fixed;
      top: 60px;
      left: 10px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 10px;
      font-size: 13px;
      z-index: 9999;
      border-radius: 6px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <img src="image.jpg?v=11" alt="">
  <div id="debug">завантаження...</div>
  <script>
    var el = document.getElementById('debug');
    var style = getComputedStyle(document.documentElement);
    el.innerHTML =
      'v11<br>' +
      'innerH: ' + window.innerHeight + '<br>' +
      'screenH: ' + window.screen.height + '<br>' +
      'outerH: ' + window.outerHeight + '<br>' +
      'safe-top: ' + style.getPropertyValue('--sat') + '<br>' +
      'safe-bot: ' + style.getPropertyValue('--sab');

    // Показуємо safe area через CSS trick
    document.documentElement.style.setProperty('--sat', 'env(safe-area-inset-top)');
    document.documentElement.style.setProperty('--sab', 'env(safe-area-inset-bottom)');
  </script>
</body>
</html>
