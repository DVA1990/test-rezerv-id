<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json?v=4">
  <title>Резерв ID</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { background: #000; overflow: hidden; }
    img {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <img src="image.jpg?v=6" alt="" id="img">
  <div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,0,0,0.7);color:#fff;padding:4px 16px;font-size:14px;z-index:9999;border-radius:4px;">v6</div>
  <script>
    function fit() {
      var img = document.getElementById('img');
      img.style.height = window.screen.height + 'px';
    }
    fit();
    window.addEventListener('resize', fit);
  </script>
</body>
</html>
